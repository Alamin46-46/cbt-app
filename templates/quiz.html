<!DOCTYPE html>
<html>
<head>
    <title>Quiz</title>
</head>
<body>

<h1>Answer Questions</h1>

<form method="POST">
    {% for q in questions %}
        <p>{{ q.text }}</p>

        {% for option in q.options %}
            <input type="radio" name="q{{ loop.parent.index0 }}" value="{{ option }}" required>
            {{ option }}<br>
        {% endfor %}
    {% endfor %}

    <button type="submit">Submit</button>
</form>

</body>
</html>
