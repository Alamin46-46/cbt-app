<!DOCTYPE html>
<html>
<head>
    <title>Quiz</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<h1>Mini CBT Test</h1>

<div class="container">
<form method="POST">
    {% for q in questions %}
        <p>{{ q.text }}</p>

        {% set q_index = loop.index0 %}

        {% for option in q.options %}
            <div class="option">
                <input type="radio" name="q{{ q_index }}" value="{{ option }}" required>
                {{ option }}
            </div>
        {% endfor %}
    {% endfor %}

    <button type="submit">Submit</button>
</form>
</div>

</body>
</html>
