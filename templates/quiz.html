<!DOCTYPE html>
<html>
<head>
    <title>Quiz</title>
</head>
<body>

<h1>Answer Questions</h1>

<form method="POST">
    {% for q in questions %}
        <p>{{ q.text }}</p>

        {% set q_index = loop.index0 %}

        {% for option in q.options %}
            <input type="radio" name="q{{ q_index }}" value="{{ option }}" required>
            {{ option }}<br>
        {% endfor %}

        <br>
    {% endfor %}

    <button type="submit">Submit</button>
</form>

</body>
</html>
